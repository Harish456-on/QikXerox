<!DOCTYPE html>
<html>
<head>
    <title>Qik Xerox - Customer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #FFD700; }
        .box { background: white; padding: 20px; border-radius: 10px; }
        input, button { width: 100%; margin: 10px 0; padding: 10px; }
        button { background: black; color: white; font-weight: bold; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
    <script src="cus_script.js" defer></script>
</head>
<body>
    <div class="box">
        <h2>Qik Xerox ⚡</h2>
        <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg">
        <input type="number" id="copies" placeholder="Number of copies" value="1">
        <button onclick="uploadFile()">Send to Shop</button>
        <p id="msg"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = { AIzaSyA8X8uekJA7qoxomkm_Fy6dHn_hcvjhI8s }; 

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.uploadFile = async () => {
            const file = document.getElementById('fileInput').files[0];
            const copies = document.getElementById('copies').value;
            const msg = document.getElementById('msg');
            
            if(!file) return alert("Select a file!");
            msg.innerText = "Uploading...";

            const sRef = ref(storage, 'jobs/' + file.name);
            await uploadBytes(sRef, file);
            const url = await getDownloadURL(sRef);

            await addDoc(collection(db, "jobs"), {
                fileUrl: url,
                fileName: file.name,
                copies: copies,
                time: serverTimestamp()
            });

            msg.innerText = "✅ Sent to Merchant!";
        };
    </script>
</body>
</html>
